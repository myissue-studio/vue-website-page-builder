version: 1
applications:
  - appRoot: app
    frontend:
      phases:
        preBuild:
          commands:
            - npm install -g pnpm@9
            - cd .. && pnpm install --no-frozen-lockfile && pnpm run build:lib
            - pnpm install --no-frozen-lockfile
        build:
          commands:
            - NITRO_PRESET=aws-lambda pnpm run build
      artifacts:
        baseDirectory: .output
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - ../.cache/**/*
          - ../.nuxt/**/*
